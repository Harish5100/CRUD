<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Edit Student</h1>
        
        <form action="/edit/{{ student_id }}" method="POST" class="form-add">
            <input type="text" name="name" value="{{ student.name }}" placeholder="Enter Name" required autocomplete="off">
            <input type="text" name="dept" value="{{ student.dept }}" placeholder="Dept" required autocomplete="off">
            <input type="number" name="year" value="{{ student.year }}" placeholder="Year" required min="1" max="4" autocomplete="off">
            <button type="submit">Update Student</button>
            <a href="/" class="btn-edit" style="text-align: center; display: block; line-height: 24px;">Cancel</a>
        </form>
    </div>
</body>
</html>
